<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splinzo · Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
  :root{
    --bg:#efe9e1; --card:#ffffff; --panel:#fbf9f6;
    --accent:#c79a5b; --accent-strong:#b0824a; --accent-soft:#f4ecdf;
    --ink:#1f1c17; --muted:#8a8175; --line:#e9e1d4;
    --r-md:14px; --r-lg:22px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--panel);color:var(--ink);-webkit-font-smoothing:antialiased}
  .fs-sm{font-size:14px;line-height:1.5}.fs-md{font-size:16px;line-height:1.5}
  .fs-lg{font-size:24px;line-height:1.25}.fs-xl{font-size:40px;line-height:1.08}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:14px;font-weight:500;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;font-family:inherit;font-size:16px;color:var(--ink);background:#fff;
    border:1.5px solid var(--line);border-radius:var(--r-md);padding:13px 15px;outline:none;transition:border-color .2s,box-shadow .2s}
  .field input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(199,154,91,.16)}
  .primary{width:100%;font-family:inherit;font-size:16px;font-weight:600;color:#fff;background:var(--ink);
    border:none;border-radius:var(--r-md);padding:14px;cursor:pointer;transition:background .2s,transform .15s;margin-top:4px}
  .primary:hover{background:#000}.primary:active{transform:scale(.99)}
  .oauth{display:flex;gap:10px;margin-top:12px}
  .oauth button{flex:1;font-family:inherit;font-size:14px;font-weight:500;color:var(--ink);background:#fff;
    border:1.5px solid var(--line);border-radius:var(--r-md);padding:11px;cursor:pointer;display:flex;align-items:center;
    justify-content:center;gap:7px;transition:border-color .2s}
  .oauth button:hover{border-color:var(--accent)}
  .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted);font-size:14px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
  .brand .sq{width:38px;height:38px;border-radius:11px;background:var(--accent);display:flex;align-items:center;justify-content:center}
  .brand .nm{font-size:16px;font-weight:700;letter-spacing:.02em}
  .foot{font-size:14px;color:var(--muted);margin-top:20px;text-align:center}
  .foot a{color:var(--accent-strong);text-decoration:none;font-weight:500}
  .formwrap{width:100%;max-width:372px}
  .eyebrow{font-size:14px;font-weight:700;letter-spacing:.12em;color:var(--accent-strong);margin-bottom:10px}

  .split{display:flex;min-height:100vh}
